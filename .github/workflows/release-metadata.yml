name: Release metadata

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  require-version-and-whats-new:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate version bump and What's New details
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: python3 release_metadata_check.py "$BASE_REF"
